services:
  comfyui:
    image: ignatberesnev/comfyui-gfx1151:v0.2
    container_name: comfyui-gfx1151
    shm_size: 8G
    volumes:
      - ./ComfyUI:/opt/ComfyUI
    ports:
      - "8188:8188"
    environment:
      - TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL=1
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - "992"   # host render
      - "44"    # host video
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped
